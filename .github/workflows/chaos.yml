name: Chaos

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  chaos-tier-b:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run Tier B chaos tests
        run: uv run pytest chaos/scenarios/ -v --tb=short